<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Owner Login — AuthSystem</title>
  <link rel="stylesheet" href="css/global.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh;
           background: radial-gradient(ellipse at 40% 20%, #1e1040 0%, var(--bg) 65%); }
    .login-wrap { width:100%; max-width:400px; padding:1rem; }
    .login-card { padding:2.5rem; }
    .logo { font-size:1.6rem; font-weight:900; letter-spacing:-1px;
            background:linear-gradient(135deg,#a78bfa,#60a5fa);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .sub  { color:var(--muted); font-size:.875rem; margin-top:.3rem; margin-bottom:2rem; }
    .form-group { margin-bottom:1.1rem; }
    label { display:block; font-size:.78rem; color:var(--muted); margin-bottom:.4rem;
            text-transform:uppercase; letter-spacing:.05em; }
    .btn-login { width:100%; padding:.75rem; font-size:1rem; margin-top:.5rem; justify-content:center; }
    .err-msg { color:var(--danger); font-size:.82rem; margin-top:.75rem; min-height:1.2em; text-align:center; }
    .back { text-align:center; margin-top:1.25rem; font-size:.82rem; color:var(--muted); }
    .back a { color:#a78bfa; text-decoration:none; }
    .back a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="card login-card">
      <div class="logo">🔐 AuthSystem</div>
      <div class="sub">Owner Portal — restricted access</div>

      <form id="loginForm">
        <div class="form-group">
          <label>Username</label>
          <input id="username" type="text" placeholder="admin" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-login">Login</button>
        <div class="err-msg" id="errMsg"></div>
      </form>
    </div>
    <div class="back"><a href="index.html">← Back to home</a></div>
  </div>

  <script>
    const form   = document.getElementById("loginForm");
    const errMsg = document.getElementById("errMsg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errMsg.textContent = "";
      const btn = form.querySelector("button");
      btn.disabled = true;
      btn.textContent = "Logging in…";

      try {
        const res  = await fetch("/api/owner/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Login failed");

        // Store JWT and redirect
        sessionStorage.setItem("auth_token", data.token);
        sessionStorage.setItem("auth_user",  data.username);
        window.location.href = "dashboard.html";
      } catch (err) {
        errMsg.textContent = err.message;
        btn.disabled = false;
        btn.textContent = "Login";
      }
    });

    // Redirect if already logged in
    if (sessionStorage.getItem("auth_token")) window.location.href = "dashboard.html";
  </script>
</body>
</html>
